name: E2E

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  e2e:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    # Critical smoke tests block; other E2E tests are advisory
    continue-on-error: false
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      NEXT_PUBLIC_KOIOS_BASE_URL: https://api.koios.rest/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SUPABASE_SECRET_KEY: placeholder-secret-key-for-ci
      SESSION_SECRET: ci-placeholder-session-secret-at-least-32-chars
      CRON_SECRET: ci-placeholder-cron-secret
      UPSTASH_REDIS_REST_URL: https://placeholder-redis.upstash.io
      UPSTASH_REDIS_REST_TOKEN: placeholder-redis-token
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: nextjs-build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Prepare standalone runtime
        run: |
          mkdir -p .next/standalone/.next
          rm -rf .next/standalone/.next/static .next/standalone/public
          cp -R .next/static .next/standalone/.next/static
          if [ -d public ]; then
            cp -R public .next/standalone/public
          fi
      - name: Start server and run E2E
        run: |
          PORT=3000 node .next/standalone/server.js &
          npx wait-on http://localhost:3000 --timeout 30000
          npm run test:e2e -- --project=chromium --project=mobile
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.event.workflow_run.head_sha }}
          path: playwright-report/
          retention-days: 7

      - name: Notify on E2E failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ vars.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "${DISCORD_WEBHOOK_URL:-}" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"content\": \"🎭 **E2E tests failed** on main\\nCommit: \`${{ github.event.workflow_run.head_sha }}\`\\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$DISCORD_WEBHOOK_URL"
          fi
