name: Agent Config

on:
  pull_request:
    paths:
      - '.claude/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '.github/CODEOWNERS'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/workflows/agent-config.yml'
      - '.github/workflows/pr-template.yml'
      - '.mcp.example.json'
      - 'scripts/*.sh'
      - 'scripts/*.ps1'
      - 'scripts/validate-agent-constraints.mjs'
  push:
    branches: [main]
    paths:
      - '.claude/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '.github/CODEOWNERS'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/workflows/agent-config.yml'
      - '.github/workflows/pr-template.yml'
      - '.mcp.example.json'
      - 'scripts/*.sh'
      - 'scripts/*.ps1'
      - 'scripts/validate-agent-constraints.mjs'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate agent constraints
        run: node scripts/validate-agent-constraints.mjs
      - name: Validate JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude/settings.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.mcp.example.json', 'utf8'))"
      - name: Validate shell syntax
        run: |
          shopt -s nullglob
          for file in .claude/hooks/*.sh scripts/*.sh; do
            bash -n "$file"
          done
      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile('scripts/new-worktree.ps1', [ref]$null, [ref]$errors) | Out-Null
          if ($errors) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }
