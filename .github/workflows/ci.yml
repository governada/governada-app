name: CI

env:
  CI_NODE_VERSION: '20'

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'tasks/**'
      - '.cursor/**'
      - '.claude/**'
      - '*.md'
      - 'LICENSE'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'tasks/**'
      - '.cursor/**'
      - '.claude/**'
      - '*.md'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Single install, shared via cache. All downstream jobs restore instead of re-installing.
  install:
    runs-on: ubuntu-latest
    outputs:
      node_modules_cache_key: ${{ steps.node_modules_cache_key.outputs.key }}
      node_modules_restore_prefix: ${{ steps.node_modules_cache_key.outputs.restore_prefix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          cache: npm
      - name: Compute node_modules cache key
        id: node_modules_cache_key
        run: |
          echo "key=nm-${{ runner.os }}-${{ runner.arch }}-node${{ env.CI_NODE_VERSION }}-${{ hashFiles('package-lock.json') }}-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          echo "restore_prefix=nm-${{ runner.os }}-${{ runner.arch }}-node${{ env.CI_NODE_VERSION }}-${{ hashFiles('package-lock.json') }}-" >> "$GITHUB_OUTPUT"
      - run: npm ci
      - uses: actions/cache/save@v5
        with:
          path: node_modules
          key: ${{ steps.node_modules_cache_key.outputs.key }}

  # Format + lint + type-check in one job (sequential, shares single cache restore)
  checks:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ needs.install.outputs.node_modules_cache_key }}
          restore-keys: |
            ${{ needs.install.outputs.node_modules_restore_prefix }}
      - run: npm run agent:validate
      - run: npm run format:check
      - run: npm run lint
      - run: npm run type-check

  # Tests run in parallel with checks
  test:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ needs.install.outputs.node_modules_cache_key }}
          restore-keys: |
            ${{ needs.install.outputs.node_modules_restore_prefix }}
      - run: npm run test:coverage
      - name: Check coverage thresholds
        run: |
          node -e "
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const targets = {
              'utils/scoring.ts': 95,
              'lib/alignment.ts': 85,
              'lib/koios.ts': 75,
              'lib/api/handler.ts': 75,
              'lib/api/withRouteHandler.ts': 90,
              'lib/syncPolicy.ts': 80,
              'lib/navigation/civicIdentity.ts': 90,
              'lib/navigation/proposalAction.ts': 85,
              'lib/navigation/returnTo.ts': 90,
              'lib/navigation/workspaceEntry.ts': 80,
            };
            const norm = (p) => p.replace(/\\\\/g, '/');
            let failed = false;
            for (const [file, minPct] of Object.entries(targets)) {
              const entry = Object.entries(report).find(([k]) => norm(k).endsWith(file));
              if (!entry) {
                console.error('FAIL: ' + file + ' missing from coverage report');
                failed = true;
                continue;
              }
              const pct = entry[1].lines.pct;
              const ok = pct >= minPct;
              console.log((ok ? 'PASS' : 'FAIL') + ': ' + file + ' lines=' + pct + '% (min=' + minPct + '%)');
              if (!ok) failed = true;
            }
            if (failed) { console.error('Coverage below threshold'); process.exit(1); }
          "

  build:
    needs: [install, checks, test]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      NEXT_PUBLIC_KOIOS_BASE_URL: https://api.koios.rest/api/v1
      NEXT_PUBLIC_APP_URL: https://governada.io
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ needs.install.outputs.node_modules_cache_key }}
          restore-keys: |
            ${{ needs.install.outputs.node_modules_restore_prefix }}
      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-
      - run: npm run build
      - name: Report bundle size
        if: github.event_name == 'pull_request'
        run: npx tsx scripts/report-bundle-size.ts
      - name: Enforce bundle budget
        run: |
          # Fail CI if total JS bundle exceeds 20 MB (raw uncompressed)
          # Baseline: ~12.5 MB. Budget gives 60% headroom for growth.
          TOTAL_JS=$(find .next/static -name '*.js' -exec wc -c {} + 2>/dev/null | tail -1 | awk '{print $1}')
          BUDGET=20971520  # 20 MB
          if [ "${TOTAL_JS:-0}" -gt "$BUDGET" ]; then
            echo "FAIL: Bundle size ${TOTAL_JS} bytes exceeds budget of ${BUDGET} bytes (20 MB)"
            exit 1
          fi
          echo "Bundle size OK: ${TOTAL_JS:-0} bytes (budget: ${BUDGET})"
      - name: Upload build artifact
        if: github.event_name == 'pull_request' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
        uses: actions/upload-artifact@v7
        with:
          include-hidden-files: true
          name: nextjs-build
          path: |
            .next/standalone
            .next/static
            .next/BUILD_ID
            .next/build-manifest.json
            .next/app-build-manifest.json
            .next/prerender-manifest.json
            .next/routes-manifest.json
            .next/required-server-files.json
            public
          retention-days: 1

  browser-smoke:
    if: github.event_name == 'pull_request'
    needs: [install, build]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      NEXT_PUBLIC_KOIOS_BASE_URL: https://api.koios.rest/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SUPABASE_SECRET_KEY: placeholder-secret-key-for-ci
      SESSION_SECRET: ci-placeholder-session-secret-at-least-32-chars
      CRON_SECRET: ci-placeholder-cron-secret
      UPSTASH_REDIS_REST_URL: https://placeholder-redis.upstash.io
      UPSTASH_REDIS_REST_TOKEN: placeholder-redis-token
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ needs.install.outputs.node_modules_cache_key }}
          restore-keys: |
            ${{ needs.install.outputs.node_modules_restore_prefix }}
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: nextjs-build
      - name: Prepare standalone runtime
        run: |
          mkdir -p .next/standalone/.next
          rm -rf .next/standalone/.next/static .next/standalone/public
          cp -R .next/static .next/standalone/.next/static
          if [ -d public ]; then
            cp -R public .next/standalone/public
          fi
      - name: Start server and run browser smoke
        run: |
          PORT=3000 node .next/standalone/server.js &
          npx wait-on http://localhost:3000 --timeout 30000
          npm run test:e2e -- e2e/smoke.spec.ts e2e/critical-journeys.spec.ts --project=chromium --project=mobile
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-browser-smoke-${{ github.sha }}
          path: playwright-report/
          retention-days: 7

  e2e-critical:
    needs: [install, build]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      NEXT_PUBLIC_KOIOS_BASE_URL: https://api.koios.rest/api/v1
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      SUPABASE_SECRET_KEY: placeholder-secret-key-for-ci
      SESSION_SECRET: ci-placeholder-session-secret-at-least-32-chars
      CRON_SECRET: ci-placeholder-cron-secret
      UPSTASH_REDIS_REST_URL: https://placeholder-redis.upstash.io
      UPSTASH_REDIS_REST_TOKEN: placeholder-redis-token
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ needs.install.outputs.node_modules_cache_key }}
          restore-keys: |
            ${{ needs.install.outputs.node_modules_restore_prefix }}
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: nextjs-build
      - name: Prepare standalone runtime
        run: |
          mkdir -p .next/standalone/.next
          rm -rf .next/standalone/.next/static .next/standalone/public
          cp -R .next/static .next/standalone/.next/static
          if [ -d public ]; then
            cp -R public .next/standalone/public
          fi
      - name: Run critical public E2E
        id: critical_public
        run: |
          PORT=3000 node .next/standalone/server.js &
          npx wait-on http://127.0.0.1:3000 --timeout 60000
          npx playwright test e2e/critical-public.spec.ts e2e/critical-a11y.spec.ts e2e/csp.spec.ts --project=chromium
      - name: Report journey verification results
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SYSTEMS_JOURNEY_VERIFICATION_URL: ${{ secrets.SYSTEMS_JOURNEY_VERIFICATION_URL }}
          SYSTEMS_JOURNEY_VERIFICATION_TOKEN: ${{ secrets.SYSTEMS_JOURNEY_VERIFICATION_TOKEN }}
          SYSTEMS_JOURNEY_STATUS: ${{ steps.critical_public.outcome }}
          SYSTEMS_JOURNEY_JOB_NAME: e2e-critical
          SYSTEMS_JOURNEY_IDS: J01,J02,J03,J05,J06,J13
        run: node scripts/report-systems-journey-verifications.mjs
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-critical-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  sentry-release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create Sentry release
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v3
        with:
          environment: production
          version: ${{ github.sha }}

  notify:
    if: failure()
    needs: [checks, test, build, browser-smoke, e2e-critical]
    runs-on: ubuntu-latest
    steps:
      - name: Discord notification
        if: vars.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ vars.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ CI failed on \`${{ github.ref_name }}\` — ${{ github.event.head_commit.message || github.event.pull_request.title || 'PR check' }}\\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL"
