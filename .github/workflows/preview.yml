name: Preview Environment

# Deploys a preview environment for PRs and verifies the PR head release is live.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: vars.RAILWAY_PREVIEW_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Resolve preview URL
        id: preview
        run: |
          PREVIEW_TEMPLATE="${{ vars.RAILWAY_PREVIEW_URL_TEMPLATE }}"
          if [ -z "$PREVIEW_TEMPLATE" ]; then
            PREVIEW_TEMPLATE="https://pr-{pr}-governada-app.up.railway.app"
          fi

          PREVIEW_URL="${PREVIEW_TEMPLATE//\{pr\}/${{ github.event.pull_request.number }}}"
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Verify preview release
        run: npm run deploy:verify -- --base-url=${{ steps.preview.outputs.preview_url }} --profile=preview --expected-sha=${{ github.event.pull_request.head.sha }} --quiet

      - name: Comment preview URL on PR
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const body = `Preview deployed and verification passed\n\nPreview URL: ${{ steps.preview.outputs.preview_url }}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Preview deployed'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Comment failure on PR
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Preview verification failed\n\nCheck the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`,
            });
