name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'tasks/**'
      - '.cursor/**'
      - '.claude/**'
      - '*.md'
      - 'LICENSE'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'tasks/**'
      - '.cursor/**'
      - '.claude/**'
      - '*.md'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast checks: format + lint + type-check in one job (saves 3 cache restores ~30s each)
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/cache/save@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm run format:check
      - run: npm run lint
      - run: npm run type-check

  # Tests run in parallel with checks (separate job for isolation)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - name: Check coverage thresholds
        run: |
          node -e "
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const targets = {
              'utils/scoring.ts': 80,
              'lib/alignment.ts': 80,
              'lib/koios.ts': 12,
            };
            const norm = (p) => p.replace(/\\\\/g, '/');
            let failed = false;
            for (const [file, minPct] of Object.entries(targets)) {
              const entry = Object.entries(report).find(([k]) => norm(k).endsWith(file));
              if (!entry) { console.log('SKIP: ' + file + ' (not in report)'); continue; }
              const pct = entry[1].lines.pct;
              const ok = pct >= minPct;
              console.log((ok ? 'PASS' : 'FAIL') + ': ' + file + ' lines=' + pct + '% (min=' + minPct + '%)');
              if (!ok) failed = true;
            }
            if (failed) { console.error('Coverage below threshold'); process.exit(1); }
          "

  build:
    needs: [checks, test]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      NEXT_PUBLIC_KOIOS_BASE_URL: https://api.koios.rest/api/v1
      NEXT_PUBLIC_APP_URL: https://governada.io
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-
      - run: npm run build
      - name: Report bundle size
        if: github.event_name == 'pull_request'
        run: npx tsx scripts/report-bundle-size.ts
      - name: Enforce bundle budget
        run: |
          # Fail CI if total JS bundle exceeds 20 MB (raw uncompressed)
          # Baseline: ~12.5 MB. Budget gives 60% headroom for growth.
          TOTAL_JS=$(find .next/static -name '*.js' -exec wc -c {} + 2>/dev/null | tail -1 | awk '{print $1}')
          BUDGET=20971520  # 20 MB
          if [ "${TOTAL_JS:-0}" -gt "$BUDGET" ]; then
            echo "FAIL: Bundle size ${TOTAL_JS} bytes exceeds budget of ${BUDGET} bytes (20 MB)"
            exit 1
          fi
          echo "Bundle size OK: ${TOTAL_JS:-0} bytes (budget: ${BUDGET})"
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: nextjs-build
          path: |
            .next/static
            .next/BUILD_ID
            .next/build-manifest.json
            .next/app-build-manifest.json
            .next/prerender-manifest.json
            .next/routes-manifest.json
            .next/required-server-files.json
            public
          retention-days: 1

  sentry-release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create Sentry release
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v3
        with:
          environment: production
          version: ${{ github.sha }}

  notify:
    if: failure()
    needs: [checks, test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Discord notification
        if: vars.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ vars.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ CI failed on \`${{ github.ref_name }}\` — ${{ github.event.head_commit.message || github.event.pull_request.title || 'PR check' }}\\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL"
