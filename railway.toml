[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPaths = [
  "app/**",
  "components/**",
  "lib/**",
  "hooks/**",
  "utils/**",
  "styles/**",
  "public/**",
  "scripts/**",
  "Dockerfile",
  "package.json",
  "package-lock.json",
  "next.config.*",
  "tailwind.config.*",
  "tsconfig.json",
  "postcss.config.*",
]

[deploy]
healthcheckPath = "/api/health/deep"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
