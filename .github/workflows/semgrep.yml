name: Semgrep

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - run: semgrep scan --config auto --config p/nextjs --config p/react --config p/owasp-top-ten --config p/typescript --error --json --output semgrep-results.json .
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 30
